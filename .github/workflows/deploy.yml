name: Deploy to site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to site repo
        env:
          DEPLOY_KEY: ${{ secrets.SITE_DEPLOY_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          ssh-add - <<< "$DEPLOY_KEY"
          git clone --depth 1 git@github.com:mschachner/site.git site
          rm -rf site/fences
          mkdir -p site/fences
          cp index.html site/fences/
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fences
          git diff --cached --quiet || git commit -m "Deploy Fences+ from ${GITHUB_SHA::7}"
          git push
